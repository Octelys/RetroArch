name: CI macOS

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install libwebsockets
      run: |
        brew install libwebsockets
        mkdir -p deps/libwebsockets/include
        cp -r "$(brew --prefix libwebsockets)/include/" deps/libwebsockets/include/
        # Stage OpenSSL headers required transitively by libwebsockets.h
        OPENSSL_PREFIX=$(brew --prefix openssl 2>/dev/null || brew --prefix openssl@3)
        cp -r "${OPENSSL_PREFIX}/include/openssl" deps/libwebsockets/include/openssl

    - name: Compile RA
      run: |
        set -o pipefail
        xcodebuild -workspace pkg/apple/RetroArch.xcworkspace -scheme RetroArch -config Release -xcconfig pkg/apple/GitHubCI.xcconfig -derivedDataPath build

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - uses: actions/upload-artifact@v6
      with:
        name: RetroArch-${{ steps.slug.outputs.sha8 }}
        path: |
          build/Build/Products/Release
