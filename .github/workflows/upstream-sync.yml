# Daily sync of upstream libretro/RetroArch changes into this fork.
# Opens (or updates) a pull request targeting main each day.
# A branch is created from main, upstream/master is merged into it,
# and a PR is opened for review.

name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * *'  # every day at 06:00 UTC
  workflow_dispatch:      # allow manual trigger from the GitHub Actions UI

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/libretro/RetroArch.git
          git fetch upstream master --no-tags

      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

          # Count commits upstream has that the fork does not
          NEW=$(git rev-list --count main..upstream/master)
          echo "new_commits=$NEW" >> "$GITHUB_OUTPUT"
          echo "Upstream has $NEW new commit(s) compared to main"

      - name: Stop early if already up to date
        if: steps.check.outputs.new_commits == '0'
        run: |
          echo "Fork is already up to date with upstream. Nothing to do."

      - name: Create sync branch from main and merge upstream
        if: steps.check.outputs.new_commits != '0'
        run: |
          # Create (or reset) the sync branch from main
          git checkout -B octelys/upstream-sync main

          # Merge upstream/master into the branch.
          # On conflicts in .github/workflows, keep ours (the fork's version).
          git merge upstream/master --no-edit \
            -X ours \
            --allow-unrelated-histories || true

          # Regardless of merge result, ensure .github/workflows matches main
          git checkout main -- .github/workflows
          # Only commit if there are staged changes to workflows
          git diff --cached --quiet || \
            git commit -m "chore: preserve fork workflow files"

      - name: Push sync branch
        if: steps.check.outputs.new_commits != '0'
        run: |
          git push origin octelys/upstream-sync --force

      - name: Open or update pull request
        if: steps.check.outputs.new_commits != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: octelys/upstream-sync
          base: main
          title: "chore: sync upstream libretro/RetroArch (${{ steps.check.outputs.new_commits }} new commit(s))"
          body: |
            ## Upstream sync

            This PR was automatically generated by the **Upstream Sync** workflow.

            | | |
            |---|---|
            | **Upstream** | [`libretro/RetroArch@master`](https://github.com/libretro/RetroArch/tree/master) |
            | **Upstream SHA** | `${{ steps.check.outputs.upstream_sha }}` |
            | **New commits** | ${{ steps.check.outputs.new_commits }} |
            | **Generated at** | ${{ github.run_id }} |

            ### Before merging
            - Review the diff for any conflicts with fork-specific changes.
            - Run the CI checks (Linux, macOS, Windows x64, Windows ARM64).

            > This PR is recreated or updated daily. Closing it without merging will result in a new one being opened the next day if upstream still has new commits.
          labels: upstream-sync
          draft: false

