name: CI Windows ARM64 (MSVC)

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  msvc:
    runs-on: windows-11-arm
    strategy:
      matrix:
        version: [2022]
        configuration: [Debug, Release]
        platform: [ARM64]

    steps:
      - uses: actions/checkout@v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1

      - name: Install libwebsockets (vcpkg)
        shell: powershell
        run: |
          $vcpkgRoot = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { "C:\vcpkg" }
          & "$vcpkgRoot\vcpkg.exe" install libwebsockets:arm64-windows
          $installed = "$vcpkgRoot\installed\arm64-windows"
          New-Item -ItemType Directory -Force deps\libwebsockets\include | Out-Null
          New-Item -ItemType Directory -Force deps\libwebsockets\arm64 | Out-Null
          Copy-Item -Path "$installed\include\*" -Destination deps\libwebsockets\include -Recurse -Force
          $lib = Get-ChildItem "$installed\lib" -Filter "websocket*.lib" | Select-Object -First 1
          if ($lib) { Copy-Item $lib.FullName deps\libwebsockets\arm64\websockets.lib -Force }

      - name: Compile RA
        working-directory: "${{ github.workspace }}/pkg/msvc"
        run: |
          msbuild -p:"Configuration=${{ matrix.configuration }}" -p:"Platform=${{ matrix.platform }}" .\RetroArch-msvc${{ matrix.version }}.sln

      - name: Get short SHA
        id: slug
        shell: powershell
        run: echo "sha8=$('${{ github.sha }}'.Substring(0,8))"  >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: retroarch-${{ matrix.version }}-${{ matrix.configuration }}-${{ matrix.platform }}-${{ steps.slug.outputs.sha8 }}
          path: |
            pkg/msvc/${{ matrix.platform }}/${{ matrix.configuration }}/RetroArch-msvc${{ matrix.version }}.exe
